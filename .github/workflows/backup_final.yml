name: Supabase Backup

on:
  schedule:
    - cron: '0 2 * * 5'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run backup from Supabase
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          docker run --rm \
            -e DATABASE_URL="$DATABASE_URL" \
            postgres:17 \
            bash -c 'PGSSLMODE=require pg_dump --schema=public --no-owner --no-privileges "$DATABASE_URL"' > backup.sql

      - name: Install jq, 7zip and PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y jq p7zip-full postgresql-client

      - name: Compress backup with password
        env:
          ZIP_PASSWORD: ${{ secrets.ZIP_PASSWORD }}
        run: |
          7z a backup.zip backup.sql -p"$ZIP_PASSWORD" -mem=AES256

      - name: Get Google Access Token
        id: google_token
        env:
          CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: |
          RESPONSE=$(curl -s -X POST https://oauth2.googleapis.com/token \
            -d client_id="$CLIENT_ID" \
            -d client_secret="$CLIENT_SECRET" \
            -d refresh_token="$REFRESH_TOKEN" \
            -d grant_type=refresh_token)

          ACCESS_TOKEN=$(echo "$RESPONSE" | jq -r '.access_token')

          if [ -z "$ACCESS_TOKEN" ] || [ "$ACCESS_TOKEN" = "null" ]; then
            echo "No se pudo obtener access_token"
            echo "$RESPONSE"
            exit 1
          fi

          echo "access_token=$ACCESS_TOKEN" >> $GITHUB_OUTPUT

      - name: Upload backup ZIP to Google Drive
        env:
          ACCESS_TOKEN: ${{ steps.google_token.outputs.access_token }}
          GOOGLE_FOLDER_ID: ${{ secrets.GOOGLE_FOLDER_ID }}
        run: |
          FILE_NAME="backup-$(date +%F-%H-%M).zip"

          RESPONSE=$(curl -s -X POST "https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,name,parents" \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -F "metadata={\"name\":\"${FILE_NAME}\",\"parents\":[\"${GOOGLE_FOLDER_ID}\"]};type=application/json;charset=UTF-8" \
            -F "file=@backup.zip;type=application/zip")

          echo "$RESPONSE"

          FILE_ID=$(echo "$RESPONSE" | jq -r '.id')

          if [ -z "$FILE_ID" ] || [ "$FILE_ID" = "null" ]; then
            echo "La subida a Google Drive falló"
            exit 1
          fi

          echo "Archivo subido correctamente: $FILE_NAME ($FILE_ID)"

      - name: Upload ZIP artifact to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: backup-zip
          path: backup.zip

      - name: Clean Neon public schema
        env:
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
        run: |
          psql "$NEON_DATABASE_URL" -v ON_ERROR_STOP=1 -c "DROP SCHEMA IF EXISTS public CASCADE; CREATE SCHEMA public;"

      - name: Restore backup to Neon
        env:
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
        run: |
          psql "$NEON_DATABASE_URL" -v ON_ERROR_STOP=1 < backup.sql
